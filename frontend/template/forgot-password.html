<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

.card{
width:450px;
background:#111827;
padding:40px;
border-radius:24px;
box-shadow:
0 20px 40px rgba(0,0,0,.35),
0 0 0 1px rgba(255,255,255,.04);
}

h1{
text-align:center;
color:white;
margin-bottom:10px;
}

p{
text-align:center;
color:#94a3b8;
margin-bottom:25px;
line-height:1.6;
}

input{
width:100%;
padding:15px;
background:#1e293b;
border:1px solid #334155;
border-radius:12px;
color:white;
margin-bottom:18px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.back{
text-align:center;
margin-top:20px;
}

.back a{
color:#60a5fa;
text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<h1>Forgot Password?</h1>

<p>
Enter your registered email address and we'll send a password reset link.
</p>

<form>

<input type="email"
placeholder="admin@example.com">

<button>
Send Reset Link
</button>

</form>

<div class="back">
<a href="login.html">
← Back to Login
</a>
</div>

</div>

</body>
</html>
