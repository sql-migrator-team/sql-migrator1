<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SQL Migrator - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

.card{
width:450px;
background:#111827;
padding:40px;
border-radius:24px;
box-shadow:
0 20px 40px rgba(0,0,0,.35),
0 0 0 1px rgba(255,255,255,.04);
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo-box{
width:72px;
height:72px;
margin:auto;
background:#2563eb;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
margin-bottom:15px;
}

.logo h1{
color:white;
font-size:32px;
font-weight:700;
}

.logo p{
color:#94a3b8;
margin-top:6px;
}

label{
display:block;
color:#e2e8f0;
font-size:14px;
margin-bottom:8px;
margin-top:14px;
}

input{
width:100%;
padding:15px;
background:#1e293b;
border:1px solid #334155;
border-radius:12px;
color:white;
font-size:15px;
outline:none;
}

input:focus{
border-color:#2563eb;
}

.actions{
display:flex;
justify-content:flex-end;
margin-top:10px;
}

.actions a{
color:#60a5fa;
font-size:14px;
text-decoration:none;
}

.btn{
width:100%;
margin-top:22px;
padding:15px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

.bottom{
margin-top:18px;
text-align:center;
color:#94a3b8;
}

.bottom a{
color:#60a5fa;
text-decoration:none;
font-weight:500;
}

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#64748b;
}

.role-switch{
display:flex;
gap:8px;
justify-content:center;
margin-top:14px;
}
.role-btn{
padding:8px 14px;
background:#0b1220;
color:#94a3b8;
border:1px solid #283444;
border-radius:10px;
cursor:pointer;
font-weight:600;
}
.role-btn.active{
background:#2563eb;
color:white;
border-color:#1e40af;
}
.specs{
margin-top:16px;
padding:12px;
background:#0b1220;
border:1px solid #1f2937;
border-radius:12px;
color:#cbd5e1;
font-size:14px;
}

.error{
	color:#fb7185;
	font-size:13px;
	margin-top:8px;
	display:none;
}
.success{
	color:#34d399;
	font-size:14px;
	margin-top:10px;
	text-align:center;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<div class="logo-box">🗄️</div>
<h1>SQL Migrator</h1>
<p id="role-heading">Sign in to your admin account</p>

<div class="role-switch" role="tablist" aria-label="Select role">
	<button type="button" class="role-btn active" data-role="admin">Admin</button>
	<button type="button" class="role-btn" data-role="user">User</button>
</div>
</div>

<form id="login-form" novalidate>

<label>Email Address</label>
<input type="email" id="email" name="email" placeholder="admin@example.com">
<div class="error" id="email-error"></div>

<label>Password</label>
<input type="password" id="password" name="password" placeholder="Enter password">
<div class="error" id="password-error"></div>

<input type="hidden" id="role-input" name="role" value="admin">

<div class="actions">
<a href="forgot-password.html">Forgot Password?</a>
</div>

<button type="submit" class="btn">Sign In</button>

<div class="success" id="form-success" style="display:none"></div>

</form>

<div class="bottom">
Don't have an account?
<a href="register.html">Register</a>
</div>





<script>
	(function(){
		const buttons = document.querySelectorAll('.role-btn');
		const panels = document.querySelectorAll('.spec-panel');
		const heading = document.getElementById('role-heading');
		const emailInput = document.getElementById('email');
		const footer = document.querySelector('.footer');
		const roleInput = document.getElementById('role-input');
		const form = document.getElementById('login-form');
		const emailError = document.getElementById('email-error');
		const passwordError = document.getElementById('password-error');
		const passwordInput = document.getElementById('password');
		const formSuccess = document.getElementById('form-success');

		function setRole(role){
			buttons.forEach(b=> b.classList.toggle('active', b.dataset.role===role));
			panels.forEach(p=> p.style.display = (p.dataset.role===role)? 'block' : 'none');
			roleInput.value = role;
			if(role==='admin'){
				heading.textContent = 'Sign in to your admin account';
				emailInput.placeholder = 'admin@example.com';
				if(footer) footer.textContent = 'SQL Migrator v1.0 — Admin Portal';
			} else {
				heading.textContent = 'Sign in as a user';
				emailInput.placeholder = 'user@yourcompany.com';
				if(footer) footer.textContent = 'SQL Migrator v1.0 — User Portal';
			}
			// if switching to user role, clear sensitive/role-specific fields
			if(role === 'user'){
				emailInput.value = '';
				passwordInput.value = '';
			}
			// clear previous errors/success
			emailError.style.display = 'none';
			passwordError.style.display = 'none';
			formSuccess.style.display = 'none';
		}

		buttons.forEach(btn=> btn.addEventListener('click', ()=> setRole(btn.dataset.role)));

		// validators
		function validateEmail(role, value){
			if(!value || !value.trim()) return 'Email is required.';
			const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
			if(!re.test(value)) return 'Enter a valid email address.';
			return '';
		}

		function validatePassword(role, value){
			if(!value) return 'Password is required.';
			if(role==='admin'){
				if(value.length < 12) return 'Admin password must be at least 12 characters.';
				if(!/[!@#\$%\^&\*]/.test(value)) return 'Admin password must include a special character.';
			} else {
				if(value.length < 8) return 'Password must be at least 8 characters.';
			}
			if(!/[A-Z]/.test(value) || !/[a-z]/.test(value) || !/\d/.test(value)){
				return 'Password must include uppercase, lowercase and a number.';
			}
			return '';
		}

		// form submit handling
		form.addEventListener('submit', function(e){
			e.preventDefault();
			const role = roleInput.value || 'admin';
			const emailVal = emailInput.value.trim();
			const pwdVal = passwordInput.value;

			const emailErr = validateEmail(role, emailVal);
			const pwdErr = validatePassword(role, pwdVal);

			let ok = true;
			if(emailErr){ emailError.textContent = emailErr; emailError.style.display = 'block'; ok = false; } else { emailError.style.display = 'none'; }
			if(pwdErr){ passwordError.textContent = pwdErr; passwordError.style.display = 'block'; ok = false; } else { passwordError.style.display = 'none'; }

			if(!ok){ formSuccess.style.display = 'none'; return; }

			// Simulate successful authentication (replace with real auth call)
			formSuccess.textContent = `Signed in successfully as ${role}.`;
			formSuccess.style.display = 'block';
			// Optionally, submit to server: form.submit();
		});

		// initialize default role
		setRole('admin');
	})();
</script>

</div>

</body>
</html>
